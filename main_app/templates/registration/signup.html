{% extends 'base.html' %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'css/form.css' %}">
{% endblock %}

{% block content %}

<h1 class="dashboard-title">Sign Up</h1>

<div class="glass-form-wrapper">

  {% if error_message %}
    <p class="form-error">{{ error_message }}</p>
  {% endif %}

  <form method="post" class="glass-form" autocomplete="off">
    {% csrf_token %}

    <div class="form-grid">
      {{ form.as_p }}
    </div>

    <button type="submit" class="btn">Create Account</button>
  </form>

  <div class="link">
    <p>Have an account?</p>
    <a href="{% url 'login' %}">Login</a>
   </dic>


</div>

{% endblock %}
