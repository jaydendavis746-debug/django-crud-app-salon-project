

{% extends "base.html" %}

{% block content %}

<div class="glass-card">
  <h1>Select a Service</h1>

  <div class="services-grid">
    {% for service in services %}
      <a class="service-card" href="{% url 'quick-book-stylist' service.id %}">
        <h3>{{ service.name }}</h3>
        <p>{{ service.duration }} mins • £{{ service.price }}</p>
      </a>
    {% endfor %}
  </div>
</div>

{% endblock %}
