{% extends 'base.html' %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'css/bookings/booking-update.css' %}">
{% endblock %}

{% block content %}
<div class="container booking-update-page">

    <div class="booking-update-card">

        <h1>Edit Booking Time</h1>

        <div class="summary-section">
            <div class="detail-row">
                <strong>Service:</strong>
                <span>{{ booking.service.name }}</span>
            </div>

            <div class="detail-row">
                <strong>Stylist:</strong>
                <span>{{ booking.stylist.username }}</span>
            </div>
        </div>

        <form method="post" class="update-form">
            {% csrf_token %}

            <div class="form-group">
                <label>Select a new date</label>
                <select id="date-select">
                    <option value="">Select date</option>
                    {% for d in available_dates %}
                        <option value="{{ d|date:'Y-m-d' }}">
                        {{ d|date:'F j, Y' }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Select a new time</label>
                <select name="availability" id="time-select">
                    <option value="">Select time</option>
                </select>
            </div>

            <button type="submit" class="btn">Update Booking</button>
        </form>

        <a href="{% url 'booking-detail' booking.id %}" class="back-link">← Back to Booking Details</a>

    </div>

</div>

<script>
document.getElementById("date-select").addEventListener("change", function() {
    const date = this.value;
    const stylistId = "{{ booking.stylist.id }}";
    const timeSelect = document.getElementById("time-select");

    timeSelect.innerHTML = "<option>Loading...</option>";

    fetch(`/api/times/${stylistId}/?date=${date}`)
        .then(response => response.json())
        .then(data => {
            timeSelect.innerHTML = "<option value=''>Select time</option>";
            data.forEach(item => {
                const [id, time] = item;
                const opt = document.createElement("option");
                opt.value = id;
                opt.textContent = time.substring(0,5);
                timeSelect.appendChild(opt);
            });
        });
});
</script>

{% endblock %}
