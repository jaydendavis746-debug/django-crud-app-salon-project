{% extends "base.html" %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'css/form.css' %}">
{% endblock %}
{% block content %}

<h1 class="dashboard-title">Service Details</h1>

<div class="glass-form-wrapper">
  <form method="post" class="glass-form">
    {% csrf_token %}

    <div class="form-grid">
      {{ form.as_p }}
    </div>

    <button type="submit" class="btn">Save Service</button>
  </form>
</div>

{% endblock %}
