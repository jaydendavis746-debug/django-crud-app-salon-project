{% extends "base.html" %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'css/form.css' %}">
{% endblock %}

{% block content %}

<div class="glass-form-wrapper">

  <h1 class="dashboard-title">
    {% if object %}Edit Availability{% else %}Add Availability{% endif %}
  </h1>

  <form method="post" class="glass-form">
    {% csrf_token %}

    <div class="form-grid">

      <label for="date">Date</label>
      <input 
          type="date" 
          id="date" 
          name="date" 
          value="{{ form.date.value|default:availability.date }}"
          class="form-input"
          required
      >

      <label for="time">Time</label>
      <input 
          type="time" 
          id="time" 
          name="time" 
          value="{{ form.time.value|default:availability.time }}"
          class="form-input"
          required
      >

    </div>

    <button type="submit" class="btn">
      {% if object %}Update{% else %}Create{% endif %}
    </button>
  </form>

</div>

{% endblock %}
