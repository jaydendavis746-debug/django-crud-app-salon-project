{% extends "base.html" %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'css/confirm-delete.css' %}">
{% endblock %}

{% block content %}

<div class="delete-wrapper">
  <div class="delete-card glass-form">
    <h1 class="dashboard-title">Delete Availability</h1>

    <p class="delete-message">
      Are you sure you want to delete this availability slot?
    </p>

    <form method="post">
      {% csrf_token %}
      <button type="submit" class=" delete-btn">Delete</button>
      <a href="{% url 'stylist-availability' %}" class="cancel-btn">Cancel</a>
    </form>
  </div>
</div>

{% endblock %}
